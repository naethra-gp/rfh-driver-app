name: rfh
description: "This application is used for rfh drivers"
publish_to: 'none' 
version: 1.0.3+3

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_easyloading: ^3.0.5
  fluttertoast: ^8.2.6
  hive_flutter: ^1.1.0
  observe_internet_connectivity: ^1.0.2
  http: any
  path_provider: ^2.1.3
  intl: ^0.20.0
  location: ^7.0.1
  geocoding: ^3.0.0
  url_launcher: ^6.3.0
  custom_sliding_segmented_control: ^1.8.3
dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^3.0.0


flutter:


  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
   - assets/
   - assets/logos/

fonts:
    - family: poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Italic.ttf
          style: italic 
        - ass   et: asts/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf 
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 800         
           
